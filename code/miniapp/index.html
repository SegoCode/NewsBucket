<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NewsBucket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ==================== CSS ==================== -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font: 16px/1.45 system-ui, -apple-system, sans-serif;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
            padding: 12px 14px 20px;
        }
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        select {
            flex: 1;
            padding: 8px 10px;
            font: inherit;
            font-size: .95em;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 8px;
            appearance: none;
            -webkit-appearance: none;
        }
        article {
            padding: 8px 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        article:last-child { border-bottom: 0; }
        h2 { font-weight: 600; line-height: 1.3; font-size: 1.1em; }
        .sources, #status { color: var(--tg-theme-hint-color); }
        .sources { font-size: .78em; margin-top: 3px; opacity: .65; }
        #status { font-size: .82em; text-align: center; padding: 36px 0; }
        article.high { border: 2px solid #ff3b30; }
        article.medium { border: 2px solid #f1c40f; }
        article.low { border: 2px solid #888; }
        article.quake { border: 2px dashed #f1c40f; }
        article.quake-high { border: 2px dashed #ff3b30; }
        article[onclick] { cursor: pointer; }
    </style>
</head>
<body>
    <!-- ==================== HTML ==================== -->
    <div class="row">
        <select id="topic">
            <option value="finance">Finance</option>
            <option value="gaming">Gaming</option>
            <option value="japan">Japan</option>
            <option value="tech">Tech</option>
            <option value="hardware">Hardware</option>
        </select>
        <select id="lang">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="jp">日本語</option>
        </select>
    </div>
    <main id="feed">
        <div id="status">Loading…</div>
    </main>
    <!-- ==================== JS ==================== -->
    <script>
        const BASE = 'https://raw.githubusercontent.com/SegoCode/NewsBucket/main/code/rss_output_cluster';
        const QUAKE = 'https://www.jma.go.jp/bosai/quake/data/list.json';
        const tg = window.Telegram?.WebApp;
        const feed = document.getElementById('feed');
        const $topic = document.querySelector('#topic');
        const $lang = document.querySelector('#lang');
        try {
            const saved = JSON.parse(localStorage.getItem('nb') || '{}');
            if (saved.t) $topic.value = saved.t;
            if (saved.l) $lang.value = saved.l;
        } catch {}
        function render(data) {
            if (!data.length) { feed.innerHTML = '<div id="status">No news</div>'; return; }
            const tier = c => c === 'high' || c === 'quake-high' ? 0 : c === 'medium' || c === 'quake' ? 1 : 2;
            const items = data.map(item => {
                const count = item.count || item.source.length;
                return { ...item, cls: item.cls || (count > 4 ? 'high' : count >= 3 ? 'medium' : 'low') };
            });
            items.sort((a, b) => tier(a.cls) - tier(b.cls) || ((a.cls || '').startsWith('quake') ? 0 : 1) - ((b.cls || '').startsWith('quake') ? 0 : 1));
            feed.innerHTML = items.map(item => {
                const onclick = item.url ? ` onclick="window.open('${item.url}', '_blank')"` : '';
                return `<article class="${item.cls}"${onclick}><h2>${item.title}</h2><div class="sources">${item.source.join(' · ')}</div></article>`;
            }).join('');
        }
        async function load() {
            feed.innerHTML = '<div id="status">Loading…</div>';
            let items = [];
            try {
                const res = await fetch(`${BASE}/rss_${$topic.value}_clusters_${$lang.value}.json`);
                if (res.ok) items = await res.json();
            } catch {}
            if ($topic.value === 'japan') {
                try {
                    const res = await fetch(QUAKE);
                    if (res.ok) {
                        const quakes = (await res.json()).filter(q => q.mag && q.cod && Date.now() - Date.parse(q.at) < 864e5);
                        const q = quakes.length && quakes.reduce((best, cur) => parseFloat(cur.mag) > parseFloat(best.mag) ? cur : best);
                        if (q) {
                            const c = q.cod.match(/[+-]\d+\.?\d*/g);
                            const lat = parseFloat(c[0]);
                            const lon = parseFloat(c[1]);
                            const url = `geo:0,0?q=${lat},${lon}`;
                            items.unshift({ 
                                title: `M${q.mag} | ${$lang.value === 'jp' ? q.anm : q.en_anm}`, 
                                source: ['JMA', new Date(q.at).toLocaleString([], { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(',', '')], 
                                cls: parseFloat(q.mag) >= 4 ? 'quake-high' : 'quake', 
                                url 
                            });
                        }
                    }
                } catch {}
            }
            render(items);
        }
        function onChange() {
            try { localStorage.setItem('nb', JSON.stringify({ t: $topic.value, l: $lang.value })); } catch {}
            if (tg) tg.HapticFeedback.selectionChanged();
            load();
        }
        $topic.onchange = onChange;
        $lang.onchange = onChange;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.disableVerticalSwipes();
            try { tg.setHeaderColor('secondary_bg_color'); } catch {}
            tg.MainButton.setParams({ text: 'Refresh' });
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.impactOccurred('heavy');
                load();
            });
            tg.MainButton.show();
        }
        load();
    </script>
</body>
</html>
