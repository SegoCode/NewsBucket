<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewsBucket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ==================== CSS ==================== -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font: 16px/1.45 system-ui, -apple-system, sans-serif;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
            padding: 12px 14px 20px;
        }
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        select {
            flex: 1;
            padding: 8px 10px;
            font: inherit;
            font-size: .95em;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 8px;
            appearance: none;
            -webkit-appearance: none;
        }
        article {
            padding: 8px 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        article:last-child { border-bottom: 0; }
        h2 { font-weight: 600; line-height: 1.3; font-size: 1.1em; }
        .sources, #status { color: var(--tg-theme-hint-color); }
        .sources { font-size: .78em; margin-top: 3px; opacity: .65; }
        #status { font-size: .82em; text-align: center; padding: 36px 0; }
        article.high { border: 2px solid #ff3b30; }
        article.medium { border: 2px solid #f1c40f; }
        article.low { border: 2px solid #888; }
        @keyframes blink-border { 50% { border-color: transparent; } }
        article.quake-recent { animation: blink-border 0.8s step-end infinite; }
        article.quake-high { border: 2px dashed #ff3b30; }
        article[onclick] { cursor: pointer; }
        #live { position: fixed; inset: 0; background: #000; z-index: 9999; }
        #liveFrame { width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>
    <!-- ==================== HTML ==================== -->
    <div class="row">
        <select id="topic">
            <option value="finance">Finance</option>
            <option value="gaming">Gaming</option>
            <option value="japan">Japan</option>
            <option value="tech">Tech</option>
        </select>
        <select id="lang">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="jp">日本語</option>
        </select>
    </div>
    <main id="feed">
        <div id="status">Loading…</div>
    </main>
    <div id="live" hidden>
        <iframe id="liveFrame" title="Live News" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <!-- ==================== JS ==================== -->
    <script>
        const BASE = 'https://raw.githubusercontent.com/SegoCode/NewsBucket/main/code/rss_output_cluster';
        const QUAKE = 'https://www.jma.go.jp/bosai/quake/data/list.json';
        const JMA = 'https://www.jma.go.jp/bosai/';
        const ytLive = id => `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&modestbranding=1&rel=0&playsinline=1&disablekb=1`;
        const LIVE = ytLive('Anr15FA9OCI');
        const LIVE_EN = ytLive('f0lYkdA-Gtw');
        const tg = window.Telegram?.WebApp;
        let jma = null;
        try {
            const saved = JSON.parse(localStorage.getItem('nb') || '{}');
            if (saved.t) topic.value = saved.t;
            if (saved.l) lang.value = saved.l;
        } catch {}
        function render(data) {
            if (!data.length) { feed.innerHTML = '<div id="status">No news</div>'; return; }
            const tier = c => c.startsWith('quake') ? 0 : c === 'high' ? 1 : c === 'medium' ? 2 : 3;
            const items = data.map(item => {
                const count = item.count || item.source.length;
                return { ...item, cls: item.cls || (count > 4 ? 'high' : count >= 3 ? 'medium' : 'low') };
            });
            items.sort((a, b) => tier(a.cls) - tier(b.cls));
            feed.innerHTML = items.map(item => `
                <article class="${item.cls}"${item.url ? ` onclick="window.open('${item.url}', '_blank')"` : ''}>
                    <h2>${item.title}</h2>
                    <div class="sources">${item.source.join(' · ')}</div>
                </article>
            `).join('');
        }
        async function load() {
            feed.innerHTML = '<div id="status">Loading…</div>';
            let items = [];
            try {
                const res = await fetch(`${BASE}/rss_${topic.value}_clusters_${lang.value}.json`);
                if (res.ok) items = await res.json();
            } catch {}
            if (topic.value === 'japan') {
                if (jma?.alerts.length) items.unshift(...jma.alerts.map(a => ({
                    title: `${lang.value === 'jp' ? '気象警報' : 'Weather alert'}: ${lang.value === 'jp' ? a.jp : a.en}`,
                    source: ['JMA', jma.prefecture],
                    cls: 'quake-high',
                    url: `${JMA}warning/#lang=en&area_type=offices&area_code=${jma.officeCode}`,
                })));
                try {
                    const res = await fetch(QUAKE);
                    if (res.ok) {
                        const raw = (await res.json()).filter(q =>
                            q.mag && q.cod &&
                            Date.now() - Date.parse(q.at) < 864e5 &&
                            parseFloat(q.mag) >= 5
                        );
                        const quakes = [...new Map(
                            raw.sort((a, b) => a.ctt.localeCompare(b.ctt)).map(q => [q.eid, q])
                        ).values()];
                        if (quakes.length) {
                            const quakeItems = quakes.sort((a, b) => Date.parse(b.at) - Date.parse(a.at)).map(q => {
                                const [lat, lon] = q.cod.match(/[+-]\d+\.?\d*/g);
                                const recent = Date.now() - Date.parse(q.at) < 36e5;
                                return {
                                    title: `M${q.mag} | ${lang.value === 'jp' ? q.anm : q.en_anm}`,
                                    source: ['JMA', new Date(q.at).toLocaleString([], { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(',', '')],
                                    cls: 'quake-high' + (recent ? ' quake-recent' : ''),
                                    url: `geo:0,0?q=${lat},${lon}`
                                };
                            });
                            items.unshift(...quakeItems);
                        }
                    }
                } catch {}
            }
            render(items);
        }
        function onChange() {
            try { localStorage.setItem('nb', JSON.stringify({ t: topic.value, l: lang.value })); } catch {}
            tg?.HapticFeedback.selectionChanged();
            syncLive();
            load();
        }
        topic.onchange = lang.onchange = onChange;
        let liveEn = false;
        const setLive = on => {
            liveEn = false;
            liveFrame.src = on ? LIVE : '';
            live.hidden = !on;
            tg.MainButton.setText(on ? 'Back to NewsBucket' : '🔴 Live News');
            tg.SecondaryButton?.setText('Switch to English');
            [tg.SecondaryButton, tg.BackButton].forEach(b => { b && (on ? b.show() : b.hide()); });
            tg.HapticFeedback.impactOccurred('heavy');
        };
        const swapLang = () => {
            liveEn = !liveEn;
            liveFrame.src = liveEn ? LIVE_EN : LIVE;
            tg.SecondaryButton.setText(liveEn ? 'Switch to Japanese' : 'Switch to English');
        };
        const syncLive = () => tg && (topic.value === 'japan' ? tg.MainButton.show() : tg.MainButton.hide());
        if (tg) {
            tg.ready();
            tg.expand();
            tg.disableVerticalSwipes();
            try {
                tg.setHeaderColor('secondary_bg_color');
                tg.setBackgroundColor('bg_color');
            } catch {}
            tg.LocationManager?.init(() => {
                tg.showAlert('NewsBucket needs location access to provide weather alerts for where you are. To enable or change it: open this bot’s chat → tap the bot name at the top → scroll to Location. Leave it off if you prefer to skip these alerts.', () => {
                    tg.LocationManager.getLocation(async coords => {
                        if (!coords) return;
                        try {
                            const place = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${coords.latitude}&longitude=${coords.longitude}&localityLanguage=en`).then(r => r.json());
                            const pref = place.countryCode === 'JP' && place.principalSubdivisionCode?.split('-')[1];
                            if (!pref) return;
                            const prefecture = place.principalSubdivision;
                            const [areas, cfg] = await Promise.all([
                                fetch(`${JMA}common/const/area.json`).then(r => r.json()),
                                fetch(`${JMA}panel/const/setting.json`).then(r => r.json()),
                            ]);
                            const offices = Object.entries(areas.offices).filter(([code]) => code.startsWith(pref));
                            if (!offices.length) return;
                            const officeCode = offices[0][0];
                            const c10 = offices.flatMap(([, o]) => o.children || []);
                            const c15 = c10.flatMap(c => areas.class10s[c]?.children || []);
                            const codes = new Set([officeCode, ...c10, ...c15,
                                ...Object.keys(areas.class20s).filter(k => c10.includes(areas.class20s[k].parent) || c15.includes(areas.class20s[k].parent))]);
                            const panels = cfg.lines[1].map(key => [key, cfg.panels[key]]);
                            const urlKeys = [...new Set(panels.flatMap(([, p]) => p.url))];
                            const data = Object.fromEntries(await Promise.all(
                                urlKeys.map(async key => [key, await fetch(JMA + cfg.urls[key]).then(r => r.json())])
                            ));
                            jma = {
                                prefecture, officeCode,
                                alerts: panels.flatMap(([key, p]) => {
                                    const level = p.url
                                        .flatMap(u => Object.values(data[u]?.[key] || {}))
                                        .flatMap(m => Object.entries(m))
                                        .filter(([c]) => codes.has(c))
                                        .map(([, v]) => v)
                                        .sort()
                                        .pop();
                                    if (!level) return [];
                                    const pick = n => (typeof n === 'string' ? n : n?.[level])?.replace(/<[^>]+>/g, ' ').trim();
                                    return [{ en: pick(p.enName), jp: pick(p.name) }];
                                }),
                            };
                            if (topic.value === 'japan') load();
                        } catch {}
                    });
                });
            });
            tg.MainButton.setText('🔴 Live News');
            tg.MainButton.onClick(() => setLive(live.hidden));
            tg.SecondaryButton?.onClick(swapLang);
            tg.BackButton.onClick(() => setLive(false));
            syncLive();
        }
        load();
    </script>
</body>
</html>
